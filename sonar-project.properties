sonar.projectKey=shopnow
sonar.projectName=ShopNow
sonar.sourceEncoding=UTF-8

# Analyse the microservices + the frontend (the monolith backend/ is legacy).
sonar.sources=services,frontend/src

# Coverage reports produced by the CI test jobs.
sonar.python.version=3.12
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Never analyse generated / vendored / build output or the legacy monolith.
sonar.exclusions=**/node_modules/**,**/build/**,**/.venv/**,**/__pycache__/**,**/*.test.js,**/*.test.jsx,backend/**
