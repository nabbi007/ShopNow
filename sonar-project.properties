sonar.projectKey=shopnow
sonar.projectName=ShopNow
sonar.sourceEncoding=UTF-8

# Analyse both apps in this monorepo.
sonar.sources=backend/app,frontend/src

# Coverage reports produced by the CI test jobs.
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Never analyse generated / vendored / build output.
sonar.exclusions=**/node_modules/**,**/build/**,**/.venv/**,**/__pycache__/**,**/*.test.js,**/*.test.jsx
