name: CI

# Runs on every PR (gate before merge) and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend (FastAPI) — lint, test with coverage, upload coverage for SonarQube.
  # ---------------------------------------------------------------------------
  backend-build-test:
    name: Backend · Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint (ruff)
        run: ruff check app

      - name: Test with coverage
        run: |
          # pytest exit code 5 = "no tests collected" — tolerated until tests
          # are added, but the coverage file is still produced for SonarQube.
          pytest --cov=app --cov-report=xml -q || ([ $? -eq 5 ] && echo "::warning::no backend tests yet")
          test -f coverage.xml || coverage xml -o coverage.xml || true

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Frontend (React/CRA) — install, test with coverage, production build.
  # CI=true makes CRA treat lint warnings as errors, so the build IS the lint gate.
  # ---------------------------------------------------------------------------
  frontend-build-test:
    name: Frontend · Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npm test -- --watchAll=false --passWithNoTests --coverage

      - name: Build (lint warnings fail the build under CI=true)
        env:
          REACT_APP_API_URL: /api
        run: npm run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 1

  # ---------------------------------------------------------------------------
  # SonarQube quality gate. Spins up an ephemeral SonarQube, pulls in the
  # coverage from the build jobs, analyses both apps, and FAILS when the gate
  # is not met (sonar.qualitygate.wait=true).
  # ---------------------------------------------------------------------------
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history gives SonarQube accurate SCM/blame data.
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Raise vm.max_map_count (required by SonarQube's Elasticsearch)
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Start ephemeral SonarQube
        run: |
          docker run -d --name sonarqube \
            -p 9000:9000 \
            -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
            sonarqube:community

      - name: Wait for SonarQube to be UP
        run: |
          for i in $(seq 1 40); do
            status=$(curl -s http://localhost:9000/api/system/status | jq -r .status 2>/dev/null || true)
            echo "Attempt $i — SonarQube status: ${status:-unreachable}"
            if [ "$status" = "UP" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::SonarQube did not become ready in time"
          docker logs sonarqube || true
          exit 1

      - name: Generate analysis token
        id: sonar
        run: |
          # The ephemeral, localhost-only container ships with the default
          # login. Rotate it to a per-run value, then mint a token.
          SONAR_HOST="http://localhost:9000"
          SONAR_USER="admin"
          INITIAL_PW="admin"
          ROTATED_PW="Sonar1-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}!"

          cp_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${SONAR_USER}:${INITIAL_PW}" -X POST "${SONAR_HOST}/api/users/change_password" \
            --data-urlencode "login=${SONAR_USER}" \
            --data-urlencode "previousPassword=${INITIAL_PW}" \
            --data-urlencode "password=${ROTATED_PW}")
          echo "change_password HTTP status: ${cp_status}"

          resp=$(curl -s -u "${SONAR_USER}:${ROTATED_PW}" -X POST \
            "${SONAR_HOST}/api/user_tokens/generate?name=ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")
          token=$(echo "$resp" | jq -r '.token // empty')
          if [ -z "$token" ]; then
            echo "::error::Failed to generate SonarQube token (change_password=${cp_status}). Response: ${resp}"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Analyze (fails if quality gate is not met)
        run: |
          docker run --rm --network host \
            -e SONAR_HOST_URL="http://localhost:9000" \
            -e SONAR_TOKEN="${{ steps.sonar.outputs.token }}" \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Collect SonarQube report
        if: always()
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
        run: |
          set +e
          PROJECT=shopnow
          BASE=http://localhost:9000
          mkdir -p sonar-report
          curl -s -u "$SONAR_TOKEN:" "$BASE/api/qualitygates/project_status?projectKey=$PROJECT" -o sonar-report/quality-gate.json
          curl -s -u "$SONAR_TOKEN:" "$BASE/api/measures/component?component=$PROJECT&metricKeys=alert_status,bugs,vulnerabilities,security_hotspots,code_smells,coverage,duplicated_lines_density,ncloc" -o sonar-report/measures.json

          status=$(jq -r '.projectStatus.status // "UNKNOWN"' sonar-report/quality-gate.json)
          {
            echo "## SonarQube Quality Gate: ${status}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            jq -r '.component.measures[]? | "| \(.metric) | \(.value) |"' sonar-report/measures.json
            echo ""
            echo "### Failed conditions"
            failed=$(jq -r '.projectStatus.conditions[]? | select(.status=="ERROR") | "- **\(.metricKey)**: actual \(.actualValue) (threshold \(.comparator) \(.errorThreshold))"' sonar-report/quality-gate.json)
            if [ -n "$failed" ]; then echo "$failed"; else echo "_None — gate passed._"; fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SonarQube report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: sonar-report/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Trivy container scan (moved here out of the backend Dockerfile). Builds each
  # image and FAILS the job on fixable CRITICAL/HIGH vulnerabilities.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for the SARIF upload to the Security tab
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
    env:
      IMAGE: shopnow-${{ matrix.name }}:ci-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            ${{ matrix.name == 'frontend' && '--build-arg REACT_APP_API_URL=/api' || '' }} \
            -t "$IMAGE" "${{ matrix.context }}"

      # --- Reports (exit-code 0: produce files, never fail here) ---------------
      - name: Trivy report (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          output: trivy-${{ matrix.name }}.txt
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy report (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Publish Trivy summary
        if: always()
        run: |
          {
            echo "## Trivy — ${{ matrix.name }} (CRITICAL/HIGH)"
            echo '```'
            cat trivy-${{ matrix.name }}.txt 2>/dev/null || echo "report not generated"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy SARIF to Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}
          path: |
            trivy-${{ matrix.name }}.txt
            trivy-${{ matrix.name }}.sarif
          if-no-files-found: warn

      # --- Gate (last, so reports above are always saved) ----------------------
      # ignore-unfixed: only fail on vulnerabilities that have a fix available.
      - name: Trivy gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # TruffleHog secret scan — fails on any verified OR unknown-status finding.
  # ---------------------------------------------------------------------------
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
