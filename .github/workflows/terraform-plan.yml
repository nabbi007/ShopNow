name: Terraform Plan

# Preview infrastructure changes on PRs that touch infra/. The plan is posted
# as a PR comment so a reviewer sees exactly what will change before merge.
# The actual apply happens in cd.yml when the PR merges to main.
on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  id-token: write        # OIDC for AWS
  contents: read
  pull-requests: write   # to post the plan comment

env:
  AWS_REGION: eu-west-1

jobs:
  plan:
    name: fmt · validate · plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.1

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
        run: |
          terraform plan -no-color -input=false -out=tfplan | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try { plan = fs.readFileSync('infra/plan.txt', 'utf8'); } catch { plan = '(no plan output)'; }
            // Keep the comment under GitHub's size limit.
            const clipped = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            const body = [
              '#### Terraform `fmt`: `${{ steps.fmt.outcome }}` · `plan`: `${{ steps.plan.outcome }}`',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              clipped,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if fmt is not clean
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Run 'terraform fmt -recursive' and commit the result."
          exit 1
