name: CD

# Deploys on merge to main. Build immutable SHA-tagged images, push to ECR,
# then let Terraform roll the ECS services onto the new tag.
#
# Gate this behind branch protection so CI (build/test, SonarQube, Trivy,
# TruffleHog) must pass before a PR can merge here.
#
# Required GitHub configuration (see .github/workflows/README.md):
#   secrets.AWS_DEPLOY_ROLE_ARN  – IAM role assumed via OIDC (no static keys)
#   secrets.DB_PASSWORD          – TF_VAR_db_password
#   secrets.SECRET_KEY           – TF_VAR_secret_key
on:
  push:
    branches: [main]

# OIDC: mint a short-lived token to assume the AWS role. No long-lived keys.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  # Never run two deploys at once (also protected by Terraform state locking).
  group: cd-main
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push · ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - { name: auth, repo: shopnow-auth, context: services, dockerfile: services/auth/Dockerfile }
          - { name: catalog, repo: shopnow-catalog, context: services, dockerfile: services/catalog/Dockerfile }
          - { name: cart, repo: shopnow-cart, context: services, dockerfile: services/cart/Dockerfile }
          - { name: order, repo: shopnow-order, context: services, dockerfile: services/order/Dockerfile }
          - { name: frontend, repo: shopnow-frontend, context: frontend, dockerfile: frontend/Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMG="$REGISTRY/${{ matrix.repo }}"
          docker build \
            -f "${{ matrix.dockerfile }}" \
            ${{ matrix.name == 'frontend' && '--build-arg REACT_APP_API_URL=/api' || '' }} \
            -t "$IMG:${GITHUB_SHA}" \
            -t "$IMG:latest" \
            "${{ matrix.context }}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  deploy:
    name: Deploy (terraform apply)
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.1

      - name: Terraform apply (ECS deploy)
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
        run: |
          terraform init
#          terraform apply -auto-approve -var="image_tag=${GITHUB_SHA}"

      - name: Deploy to EKS (roll each service to the new image)
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REG="$ACCOUNT.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws eks update-kubeconfig --region "$AWS_REGION" --name shopnow-eks
          for s in auth catalog cart order frontend; do
            kubectl -n shopnow set image "deployment/$s" "$s=$REG/shopnow-$s:${GITHUB_SHA}"
          done
          kubectl -n shopnow rollout status \
            deployment/auth deployment/catalog deployment/cart deployment/order deployment/frontend \
            --timeout=180s

      - name: Output app URLs
        working-directory: infra
        run: |
          {
            echo "### Deployed"
            echo "- ECS: $(terraform output -raw alb_url)"
            echo "- EKS: $(terraform output -raw eks_alb_url)"
          } >> "$GITHUB_STEP_SUMMARY" || true
