name: CD

# Deploys on merge to main. Build immutable SHA-tagged images, push to ECR,
# then let Terraform roll the ECS services onto the new tag.
#
# Gate this behind branch protection so CI (build/test, SonarQube, Trivy,
# TruffleHog) must pass before a PR can merge here.
#
# Required GitHub configuration (see .github/workflows/README.md):
#   secrets.AWS_DEPLOY_ROLE_ARN  – IAM role assumed via OIDC (no static keys)
#   secrets.DB_PASSWORD          – TF_VAR_db_password
#   secrets.SECRET_KEY           – TF_VAR_secret_key
on:
  push:
    branches: [main]

# OIDC: mint a short-lived token to assume the AWS role. No long-lived keys.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  # Never run two deploys at once (also protected by Terraform state locking).
  group: cd-main
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push · ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            repo: shopnow-backend
            context: backend
          - name: frontend
            repo: shopnow-frontend
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMG="$REGISTRY/${{ matrix.repo }}"
          docker build \
            ${{ matrix.name == 'frontend' && '--build-arg REACT_APP_API_URL=/api' || '' }} \
            -t "$IMG:${GITHUB_SHA}" \
            -t "$IMG:latest" \
            "${{ matrix.context }}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  deploy:
    name: Deploy (terraform apply)
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.1

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve -var="image_tag=${GITHUB_SHA}"

      - name: Output app URL
        working-directory: infra
        run: terraform output -raw alb_url >> "$GITHUB_STEP_SUMMARY" || true
