# API gateway: path-based routing to the four microservices. This is the local
# equivalent of the ALB listener rules (ECS) / Ingress paths (EKS).
server {
    listen 80;
    server_name _;
    server_tokens off;

    # Docker's embedded DNS, so upstreams are re-resolved (survives restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/auth/ {
        set $svc auth:8000;
        proxy_pass http://$svc$request_uri;
        proxy_set_header Host $host;
    }
    location /api/products/ {
        set $svc catalog:8000;
        proxy_pass http://$svc$request_uri;
        proxy_set_header Host $host;
    }
    location /api/cart/ {
        set $svc cart:8000;
        proxy_pass http://$svc$request_uri;
        proxy_set_header Host $host;
    }
    location /api/orders/ {
        set $svc order:8000;
        proxy_pass http://$svc$request_uri;
        proxy_set_header Host $host;
    }

    location = /health {
        return 200 "ok\n";
    }
    location / {
        return 404;
    }
}
