services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ms_pg_data:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ./services
      dockerfile: auth/Dockerfile
    image: shopnow-auth:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/auth
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  catalog:
    build:
      context: ./services
      dockerfile: catalog/Dockerfile
    image: shopnow-catalog:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/catalog
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cart:
    build:
      context: ./services
      dockerfile: cart/Dockerfile
    image: shopnow-cart:local
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      CATALOG_URL: http://catalog:8000
    depends_on:
      redis:
        condition: service_healthy
      catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  order:
    build:
      context: ./services
      dockerfile: order/Dockerfile
    image: shopnow-order:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/orders
      SECRET_KEY: ${SECRET_KEY}
      CATALOG_URL: http://catalog:8000
      CART_URL: http://cart:8000
    depends_on:
      db:
        condition: service_healthy
      catalog:
        condition: service_healthy
      cart:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./services/gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      catalog:
        condition: service_healthy
      cart:
        condition: service_healthy
      order:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
    restart: unless-stopped
    environment:
      BACKEND_HOST: gateway:80 # frontend nginx proxies /api -> gateway
    ports:
      - "8088:80"
    depends_on:
      - gateway

  # --- one-off seeders (own their service's database) ------------------------
  seed-auth:
    build:
      context: ./services
      dockerfile: auth/Dockerfile
    image: shopnow-auth:local
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/auth
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      auth:
        condition: service_healthy
    command: python -m app.seed
    restart: "no"

  seed-catalog:
    build:
      context: ./services
      dockerfile: catalog/Dockerfile
    image: shopnow-catalog:local
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/catalog
    depends_on:
      catalog:
        condition: service_healthy
    command: python -m app.seed
    restart: "no"

volumes:
  ms_pg_data:
