apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopnow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 259401054581.dkr.ecr.eu-west-1.amazonaws.com/shopnow-frontend:latest
          ports:
            - containerPort: 80
          # nginx resolves BACKEND_HOST at startup; the ALB Ingress actually
          # routes /api, so this just needs to be a Service that exists.
          env:
            - name: BACKEND_HOST
              value: "catalog:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopnow
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
