apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: shopnow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: 259401054581.dkr.ecr.eu-west-1.amazonaws.com/shopnow-order:latest
          ports:
            - containerPort: 8000
          # order needs the catalog/cart URLs (config) + its own DB + SECRET_KEY.
          envFrom:
            - configMapRef:
                name: shopnow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopnow-secrets
                  key: ORDER_DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: shopnow-secrets
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: shopnow
spec:
  selector:
    app: order
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
