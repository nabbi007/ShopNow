apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: shopnow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: 259401054581.dkr.ecr.eu-west-1.amazonaws.com/shopnow-cart:latest
          ports:
            - containerPort: 8000
          # cart is stateless wrt SQL — only needs REDIS_URL + CATALOG_URL.
          envFrom:
            - configMapRef:
                name: shopnow-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: shopnow
spec:
  selector:
    app: cart
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
